{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swarmagents.kubeswarm.io
spec:
  group: kubeswarm.io
  names:
    categories:
    - kubeswarm
    kind: SwarmAgent
    listKind: SwarmAgentList
    plural: swarmagents
    shortNames:
    - swagent
    - swagents
    singular: swarmagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .spec.runtime.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.dailyTokenUsage.totalTokens
      name: Tokens(24h)
      priority: 1
      type: integer
    - jsonPath: .status.conditions[?(@.type=="GatewayReady")].status
      name: Gateway
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SwarmAgent manages a pool of LLM agent instances.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwarmAgentSpec defines the desired state of a SwarmAgent.
            properties:
              agents:
                description: Agents lists other SwarmAgent or registry capabilities
                  callable as tools via A2A.
                items:
                  description: "AgentConnection defines another agent callable as
                    a tool via A2A.\nExactly one of agentRef or capabilityRef must
                    be set.\n\nConstraint matrix:\n\n\tC1: exactly one of agentRef
                    or capabilityRef\n\tC2: advisor role requires agentRef and forbids
                    capabilityRef\n\tC3: contextPropagation only valid with advisor
                    role"
                  properties:
                    agentRef:
                      description: |-
                        AgentRef names a SwarmAgent in the same namespace whose MCP-exposed
                        capabilities are made available as tools. The target must have at least
                        one capability with exposeMCP: true.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    capabilityRef:
                      description: |-
                        CapabilityRef names a capability ID in the namespace's SwarmRegistry.
                        The operator resolves the MCP gateway URL at reconcile time.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    contextPropagation:
                      description: |-
                        ContextPropagation configures how conversation context is forwarded to
                        an advisor agent. Only valid when role is "advisor".
                      properties:
                        excludeSystemPrompt:
                          description: |-
                            ExcludeSystemPrompt prevents the executor's system prompt from being
                            included in the context sent to the advisor.
                          type: boolean
                        maxAdvisorTokensPerTask:
                          default: 0
                          description: |-
                            MaxAdvisorTokensPerTask caps cumulative advisor input+output tokens
                            across all calls to this advisor within one execution attempt.
                            0 means no per-advisor limit (cost control deferred to SwarmBudget).
                          format: int32
                          minimum: 0
                          type: integer
                        maxCallsPerTask:
                          default: 3
                          description: |-
                            MaxCallsPerTask caps how many times the executor can consult this
                            advisor in a single task execution attempt. The counter resets when
                            the task queue retries the task (new attempt = new counter).
                          format: int32
                          maximum: 50
                          minimum: 1
                          type: integer
                        maxContextBytes:
                          default: 262144
                          description: |-
                            MaxContextBytes caps the serialised context payload. Oldest messages
                            are dropped to fit. Default 256KB.
                          format: int32
                          maximum: 1048576
                          minimum: 1024
                          type: integer
                        recentMessages:
                          default: 20
                          description: |-
                            RecentMessages is the number of recent conversation entries from the
                            executor's conversation to include in the advisor's context.
                          format: int32
                          maximum: 200
                          minimum: 1
                          type: integer
                        timeoutSeconds:
                          default: 60
                          description: |-
                            TimeoutSeconds is the wall-clock timeout for an individual advisor
                            call, from initiation to final response byte.
                          format: int32
                          maximum: 300
                          minimum: 5
                          type: integer
                        toolName:
                          description: |-
                            ToolName overrides the auto-generated tool name. When empty, the
                            tool is named consult_<sanitised_name>.
                          maxLength: 63
                          pattern: ^[a-z][a-z0-9_]*$
                          type: string
                      type: object
                    instructions:
                      description: |-
                        Instructions is operational context injected into the agent's system prompt
                        for calls to this agent. Use to constrain scope or set expectations.
                      type: string
                    name:
                      description: |-
                        Name is the local identifier for this agent connection.
                        Used in guardrails.tools allow/deny patterns: "<name>/<capability>".
                      minLength: 1
                      type: string
                    role:
                      default: tool
                      description: |-
                        Role defines the operational mode. "tool" (default) behaves as today.
                        "advisor" enables context propagation and auto-injects a consult_<name>
                        tool into the executor's tool list.
                      enum:
                      - tool
                      - advisor
                      type: string
                    trust:
                      description: |-
                        Trust classifies the trust level of this agent connection.
                        Defaults to guardrails.tools.trust.default when unset.
                      enum:
                      - internal
                      - external
                      - sandbox
                      type: string
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of agentRef or capabilityRef must be set
                    rule: has(self.agentRef) != has(self.capabilityRef)
                  - message: advisor role requires agentRef and forbids capabilityRef
                    rule: self.role != 'advisor' || (has(self.agentRef) && !has(self.capabilityRef))
                  - message: contextPropagation is only valid when role is advisor
                    rule: '!has(self.contextPropagation) || self.role == ''advisor'''
                maxItems: 50
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              capabilities:
                description: |-
                  Capabilities advertises what this agent can do to SwarmRegistry and the MCP gateway.
                  Agents without capabilities are invisible to registry lookups.
                items:
                  description: AgentCapability advertises one capability this agent
                    offers to SwarmRegistry and the MCP gateway.
                  properties:
                    description:
                      description: Description explains the capability to human operators
                        and LLM consumers.
                      type: string
                    exposeMCP:
                      default: false
                      description: |-
                        ExposeMCP registers this capability as a named tool at the MCP gateway endpoint
                        for this agent. Requires the MCP gateway to be enabled in the operator.
                      type: boolean
                    inputSchema:
                      description: |-
                        InputSchema is a JSON Schema object describing the capability's input parameters.
                        Stored as a raw YAML/JSON object; enables CRD validation and tooling introspection.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    name:
                      description: Name uniquely identifies this capability. Used
                        for registry lookups and MCP tool naming.
                      minLength: 1
                      type: string
                    outputSchema:
                      description: OutputSchema is a JSON Schema object describing
                        the capability's output shape.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    tags:
                      description: |-
                        Tags enable coarse-grained filtering in registry lookups.
                        A lookup matches agents that declare ALL listed tags.
                      items:
                        type: string
                      maxItems: 100
                      type: array
                  required:
                  - name
                  type: object
                maxItems: 200
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              gateway:
                description: |-
                  Gateway configures this agent as a gateway to the swarm.
                  When set, the operator injects registry_search and dispatch tools
                  and adds a GatewayReady condition to status.
                  Mutually exclusive with being an inline role in a SwarmTeam
                  (enforced by admission webhook).
                properties:
                  allowGatewayTargets:
                    default: false
                    description: |-
                      AllowGatewayTargets permits dispatching to other gateway agents.
                      When false (default), the operator excludes agents with spec.gateway
                      set from the capability list.
                    type: boolean
                  allowedTargets:
                    description: |-
                      AllowedTargets restricts which agents the gateway can dispatch to.
                      Entries are SwarmAgent names. When empty, all non-gateway agents
                      discoverable via the registry are allowed.
                    items:
                      type: string
                    maxItems: 100
                    type: array
                  dispatchMode:
                    default: enabled
                    description: |-
                      DispatchMode controls whether the gateway can dispatch work to other agents.
                      "enabled" (default): registry_search and dispatch tools are both injected.
                      "disabled": only registry_search is injected; the gateway can search but not dispatch.
                    enum:
                    - enabled
                    - disabled
                    type: string
                  dispatchTimeoutSeconds:
                    default: 120
                    description: |-
                      DispatchTimeoutSeconds is the maximum time the gateway will wait for
                      a single dispatched task to complete.
                    format: int32
                    maximum: 3600
                    minimum: 10
                    type: integer
                  fallback:
                    description: |-
                      Fallback controls what happens when no capability matches.
                      When nil, defaults to answer-directly behavior.
                    properties:
                      agentRef:
                        description: |-
                          AgentRef names the fallback agent to dispatch to when Mode is "agent".
                          Required when Mode is "agent", ignored otherwise.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      mode:
                        default: answer-directly
                        description: Mode determines the fallback behavior.
                        enum:
                        - fail
                        - answer-directly
                        - agent
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: agentRef is required when fallback mode is 'agent'
                      rule: self.mode != 'agent' || has(self.agentRef)
                  filterByTags:
                    description: |-
                      FilterByTags filters discovery to capabilities matching ALL listed tags.
                      Empty means no tag filtering - all capabilities in the registry are visible.
                      Filters by AgentCapability.Tags values, not capability IDs.
                    items:
                      type: string
                    maxItems: 50
                    type: array
                  maxDispatchCalls:
                    default: 5
                    description: MaxDispatchCalls caps how many times the LLM can
                      call dispatch in a single task.
                    format: int32
                    maximum: 20
                    minimum: 1
                    type: integer
                  maxDispatchDepth:
                    default: 3
                    description: MaxDispatchDepth is the maximum dispatch chain depth
                      per task.
                    format: int32
                    maximum: 10
                    minimum: 1
                    type: integer
                  maxResultsPerSearch:
                    default: 10
                    description: |-
                      MaxResultsPerSearch caps how many capabilities registry_search returns
                      to the LLM per call.
                    format: int32
                    maximum: 50
                    minimum: 1
                    type: integer
                  maxSearchCalls:
                    default: 3
                    description: MaxSearchCalls caps how many times the LLM can call
                      registry_search in a single task.
                    format: int32
                    maximum: 20
                    minimum: 1
                    type: integer
                  registryRef:
                    description: |-
                      RegistryRef names the SwarmRegistry to query for capability discovery.
                      Required. The registry's spec.scope controls whether discovery is
                      namespace-scoped or cluster-wide.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                required:
                - registryRef
                type: object
              guardrails:
                description: Guardrails groups tool permissions, budget enforcement,
                  and execution limits.
                properties:
                  budgetRef:
                    description: |-
                      BudgetRef references a SwarmBudget that governs token spend for this agent.
                      When the budget is exhausted new tasks are rejected.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  limits:
                    description: Limits constrains per-agent resource and cost usage.
                    properties:
                      circuitBreaker:
                        description: CircuitBreaker configures the circuit breaker
                          for LLM and tool calls.
                        properties:
                          cooldownSeconds:
                            default: 30
                            description: CooldownSeconds is how long the circuit stays
                              open. Default 30.
                            maximum: 600
                            minimum: 1
                            type: integer
                          failureThreshold:
                            default: 5
                            description: FailureThreshold is consecutive failures
                              before the circuit opens. Default 5.
                            maximum: 100
                            minimum: 1
                            type: integer
                          halfOpenMaxCalls:
                            default: 1
                            description: HalfOpenMaxCalls is probe calls allowed in
                              half-open state. Default 1.
                            maximum: 10
                            minimum: 1
                            type: integer
                        type: object
                      concurrentTasks:
                        default: 5
                        description: ConcurrentTasks is the maximum number of tasks
                          processed in parallel per replica.
                        type: integer
                      dailyTokens:
                        description: |-
                          DailyTokens is the rolling 24-hour token budget (input + output combined).
                          When reached the operator scales replicas to 0 and sets a BudgetExceeded condition.
                          Resumes automatically when the 24-hour window rotates. Zero means no daily limit.
                        format: int64
                        minimum: 1
                        type: integer
                      maxAnswerTokensPerCall:
                        description: |-
                          MaxAnswerTokensPerCall caps answer tokens per LLM call (per turn).
                          Nil means no cap.
                        format: int32
                        maximum: 200000
                        minimum: 1
                        type: integer
                      maxThinkingTokensPerCall:
                        description: |-
                          MaxThinkingTokensPerCall caps thinking tokens per LLM call (per turn,
                          not per step). The runtime enforces this provider-aware: Anthropic
                          clamps spec.reasoning.budgetTokens down to this ceiling; OpenAI
                          downgrades the effort level. Nil means no cap.
                        format: int32
                        maximum: 200000
                        minimum: 1
                        type: integer
                      retries:
                        default: 3
                        description: |-
                          Retries is the number of times a failed task is requeued before dead-lettering.
                          Set to 0 to disable retries entirely.
                        maximum: 100
                        minimum: 0
                        type: integer
                      timeoutSeconds:
                        default: 120
                        description: TimeoutSeconds is the per-task deadline in seconds.
                        type: integer
                      tokensPerCall:
                        default: 8000
                        description: TokensPerCall is the maximum number of tokens
                          per LLM API call.
                        type: integer
                    type: object
                  tools:
                    description: Tools configures allow/deny lists and trust policy
                      for tool calls.
                    properties:
                      allow:
                        description: |-
                          Allow is an allowlist of tool calls in "<server-name>/<tool-name>" format.
                          Wildcards are supported: "filesystem/*" allows all tools from the filesystem server.
                          When set, only listed tool calls are permitted. Deny takes precedence over allow.
                        items:
                          type: string
                        maxItems: 100
                        type: array
                      deny:
                        description: |-
                          Deny is a denylist of tool calls in "<server-name>/<tool-name>" format.
                          Wildcards are supported: "shell/*" denies all shell tools.
                          Deny takes precedence over allow when both match.
                        items:
                          type: string
                        maxItems: 100
                        type: array
                      trust:
                        description: Trust configures the default trust level and
                          input validation policy.
                        properties:
                          default:
                            default: external
                            description: |-
                              Default is the trust level applied to tools and agents that do not declare
                              an explicit trust field. Defaults to external.
                            enum:
                            - internal
                            - external
                            - sandbox
                            type: string
                        type: object
                    type: object
                type: object
              infrastructure:
                description: |-
                  Infrastructure groups cluster integration concerns: registry, network policy,
                  API key injection, environment variables, and gRPC plugin overrides.
                properties:
                  apiKeyRef:
                    description: |-
                      APIKeyRef injects an LLM provider API key from a native Kubernetes Secret.
                      The key is set as the environment variable named by the Secret key
                      (e.g. key "ANTHROPIC_API_KEY" in Secret "my-keys" sets ANTHROPIC_API_KEY).
                      For multiple keys or complex setups, use envFrom instead.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                  envFrom:
                    description: |-
                      EnvFrom injects environment variables from Secrets or ConfigMaps into agent pods.
                      Entries listed here take precedence over the global kubeswarm-api-keys Secret.
                    items:
                      description: EnvFromSource represents the source of a set of
                        ConfigMaps or Secrets
                      properties:
                        configMapRef:
                          description: The ConfigMap to select from
                          properties:
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap must be defined
                              type: boolean
                          type: object
                          x-kubernetes-map-type: atomic
                        prefix:
                          description: |-
                            Optional text to prepend to the name of each environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        secretRef:
                          description: The Secret to select from
                          properties:
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret must be defined
                              type: boolean
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                    type: array
                  networkPolicy:
                    default: default
                    description: |-
                      NetworkPolicy controls the NetworkPolicy generated for agent pods.
                      default: DNS + Redis + open HTTPS egress.
                      strict:  DNS + Redis; HTTPS egress restricted to declared MCP server IPs.
                      disabled: no NetworkPolicy generated (use when CNI manages policy externally).
                    enum:
                    - default
                    - strict
                    - disabled
                    type: string
                  plugins:
                    description: Plugins configures external gRPC provider or queue
                      overrides (RFC-0025).
                    properties:
                      llm:
                        description: |-
                          LLM is the host:port of an external gRPC LLM provider plugin.
                          When set the agent uses the gRPC adapter instead of the built-in provider.
                        properties:
                          address:
                            description: Address is the host:port of the gRPC plugin
                              server.
                            minLength: 1
                            type: string
                          tlsSecretRef:
                            description: |-
                              TLSSecretRef references a Secret containing TLS credentials for mTLS.
                              The Secret must contain tls.crt, tls.key, and ca.crt.
                              When not set the connection is plaintext.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                        required:
                        - address
                        type: object
                      queue:
                        description: |-
                          Queue is the host:port of an external gRPC task queue plugin.
                          When set TASK_QUEUE_URL is ignored and the agent uses the gRPC queue adapter.
                        properties:
                          address:
                            description: Address is the host:port of the gRPC plugin
                              server.
                            minLength: 1
                            type: string
                          tlsSecretRef:
                            description: |-
                              TLSSecretRef references a Secret containing TLS credentials for mTLS.
                              The Secret must contain tls.crt, tls.key, and ca.crt.
                              When not set the connection is plaintext.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                        required:
                        - address
                        type: object
                    type: object
                  registryRef:
                    description: |-
                      RegistryRef names the SwarmRegistry this agent registers into.
                      Defaults to "default". Omit to opt out of all registry indexing.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              model:
                description: Model is the LLM model ID (e.g. "claude-sonnet-4-6").
                minLength: 1
                type: string
              observability:
                description: Observability groups health check, logging, and metrics
                  configuration.
                properties:
                  auditLog:
                    description: |-
                      AuditLog configures the structured audit trail.
                      When set, overrides namespace (SwarmSettings) and cluster (Helm) audit config.
                    properties:
                      mode:
                        default: "off"
                        description: |-
                          Mode controls the verbosity of audit logging.
                          off: no audit events emitted (default).
                          actions: emit structured action events.
                          verbose: emit action events plus full LLM conversation turns.
                        enum:
                        - "off"
                        - actions
                        - verbose
                        type: string
                      redact:
                        description: |-
                          Redact is a list of glob patterns for field path redaction.
                          Patterns use dot-separated paths matched via Go's path.Match,
                          where * matches exactly one path segment.
                          Example: "detail.input.*.apiKey"
                        items:
                          type: string
                        maxItems: 20
                        type: array
                    type: object
                  healthCheck:
                    description: HealthCheck defines how agent health is evaluated
                      and how degraded agents are alerted.
                    properties:
                      intervalSeconds:
                        default: 30
                        description: IntervalSeconds is how often the probe runs.
                        type: integer
                      notifyRef:
                        description: NotifyRef references a SwarmNotify policy used
                          for AgentDegraded events.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      prompt:
                        description: Prompt is the message sent when type is semantic.
                        type: string
                      type:
                        default: semantic
                        description: Type is the probe strategy.
                        enum:
                        - semantic
                        - ping
                        type: string
                    required:
                    - type
                    type: object
                  logging:
                    description: Logging controls structured log emission from the
                      agent runtime.
                    properties:
                      level:
                        default: info
                        description: Level is the minimum log level emitted.
                        enum:
                        - debug
                        - info
                        - warn
                        - error
                        type: string
                      llmTurns:
                        description: |-
                          LLMTurns enables logging of the full LLM message history per task.
                          Verbose and potentially sensitive - enable only for debugging.
                        type: boolean
                      redaction:
                        description: Redaction controls scrubbing of sensitive values
                          from log output.
                        properties:
                          pii:
                            description: |-
                              PII scrubs common PII patterns (email addresses, IP addresses, phone numbers)
                              from tool call args and results.
