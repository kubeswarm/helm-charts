                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dailyTokenUsage:
                description: |-
                  DailyTokenUsage is the sum of tokens consumed in the rolling 24-hour window.
                  Populated only when guardrails.limits.dailyTokens is set.
                properties:
                  inputTokens:
                    description: InputTokens is the total number of prompt/input tokens
                      sent to the LLM.
                    format: int64
                    type: integer
                  model:
                    description: |-
                      Model identifies which model generated this usage record.
                      Populated for advisor calls to enable per-model cost attribution.
                    type: string
                  outputTokens:
                    description: |-
                      OutputTokens is the total number of final-answer/completion tokens generated
                      by the LLM. This does NOT include thinking tokens - those are counted
                      separately in ThinkingTokens.
                    format: int64
                    type: integer
                  thinkingTokens:
                    description: |-
                      ThinkingTokens is the number of tokens spent on the model's internal
                      reasoning pass, billed at the provider's thinking-token rate.
                      Counted separately from OutputTokens, not additive. Total tokens per
                      step is InputTokens + OutputTokens + ThinkingTokens; consumers must sum
                      all three to avoid undercounting. Zero on non-reasoning calls. For
                      multi-turn steps (tool-use loops), this is the sum across all turns in
                      the step.
                    format: int64
                    type: integer
                  totalTokens:
                    description: |-
                      TotalTokens is InputTokens + OutputTokens + ThinkingTokens, provided for
                      convenient display.
                    format: int64
                    type: integer
                required:
                - inputTokens
                - outputTokens
                - totalTokens
                type: object
              dedupEnabled:
                description: DedupEnabled surfaces whether tool-call deduplication
                  is active for this agent.
                type: boolean
              desiredReplicas:
                description: |-
                  DesiredReplicas is the autoscaling-computed target replica count.
                  Nil for standalone agents not managed by a team autoscaler.
                format: int32
                type: integer
              exposedMCPCapabilities:
                description: ExposedMCPCapabilities lists the capability names currently
                  registered at the MCP gateway.
                items:
                  type: string
                maxItems: 100
                type: array
                x-kubernetes-list-type: set
              gateway:
                description: |-
                  Gateway reports gateway-specific observable state.
                  Only populated when spec.gateway is set.
                properties:
                  lastCapabilitySync:
                    description: |-
                      LastCapabilitySync is the time the operator last updated the
                      gateway's capability list.
                    format: date-time
                    type: string
                  routableCapabilities:
                    description: |-
                      RoutableCapabilities is the count of capabilities injected into the
                      gateway pod after tag filtering, readiness checks, and the 50-entry cap.
                    format: int32
                    type: integer
                  totalMatchingCapabilities:
                    description: TotalMatchingCapabilities is the count before the
                      50-entry cap.
                    format: int32
                    type: integer
                type: object
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
              readyReplicas:
                description: ReadyReplicas is the number of agent pods ready to accept
                  tasks.
                format: int32
                type: integer
              replicas:
                description: Replicas is the total number of agent pods (ready or
                  not).
                format: int32
                type: integer
              systemPromptHash:
                description: SystemPromptHash is the SHA-256 hex digest of the resolved
                  system prompt last applied.
                type: string
              toolAgentConnections:
                description: ToolAgentConnections reports the status of tool-role
                  agent connections.
                items:
                  description: ToolAgentConnectionStatus reports the status of one
                    tool-role agent connection.
                  properties:
                    lastTransitionTime:
                      description: LastTransitionTime is the last time Ready changed.
                      format: date-time
                      type: string
                    name:
                      description: Name matches the AgentConnection name.
                      type: string
                    ready:
                      description: Ready indicates the target agent exists and has
                        ready replicas.
                      type: boolean
                    trust:
                      description: Trust is the trust level assigned to this connection.
                      enum:
                      - internal
                      - external
                      - sandbox
                      type: string
                  required:
                  - lastTransitionTime
                  - name
                  - ready
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              toolConnections:
                description: ToolConnections reports the last observed connectivity
                  state of each configured MCP server.
                items:
                  description: SwarmAgentMCPStatus reports the last observed health
                    of one MCP server.
                  properties:
                    authType:
                      description: |-
                        AuthType reports what authentication the controller configured for this
                        server: "none", "bearer", or "mtls". Empty means not yet evaluated.
                      enum:
                      - none
                      - bearer
                      - mtls
                      type: string
                    healthy:
                      description: |-
                        Healthy is true when the last probe received a non-5xx HTTP response.
                        Nil means the server has not been probed yet.
                      type: boolean
                    lastCheck:
                      description: LastCheck is when the probe was last run.
                      format: date-time
                      type: string
                    message:
                      description: Message holds error detail when Healthy is false.
                      type: string
                    name:
                      description: Name matches MCPToolSpec.name.
                      type: string
                    trust:
                      description: |-
                        Trust is the trust level assigned to this MCP server.
                        Mirrors spec for observability - confirms the controller applied it.
                      enum:
                      - internal
                      - external
                      - sandbox
                      type: string
                    url:
                      description: URL is the MCP server endpoint that was probed.
                      type: string
                  required:
                  - name
                  - url
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      scale:
        specReplicasPath: .spec.runtime.replicas
        statusReplicasPath: .status.replicas
      status: {}
{{- end }}
