{{- if .Values.dashboard.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-dashboard
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
rules:
  - apiGroups: ["kubeswarm.io"]
    resources:
      - swarmagents
      - swarmteams
      - swarmruns
      - swarmevents
      - swarmmemories
      - swarmsettings
      - swarmnotifies
      - swarmbudgets
      - swarmregistries
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeswarm.io"]
    resources:
      - swarmagents
      - swarmevents
    verbs: ["patch"]
  - apiGroups: ["kubeswarm.io"]
    resources:
      - swarmruns
    verbs: ["create"]
  - apiGroups: ["kubeswarm.io"]
    resources:
      - swarmruns/status
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-dashboard
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-dashboard
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubeswarm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "kubeswarm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: dashboard
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image }}
          imagePullPolicy: {{ .Values.dashboard.imagePullPolicy }}
          args: ["--addr", ":8090"]
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  selector:
    {{- include "kubeswarm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 8090
      targetPort: http
      protocol: TCP
  type: ClusterIP
{{- end }}
