{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeswarm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubeswarm.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.extraEgress }}
    - Egress
    {{- end }}
  ingress:
    # Default: allow the operator's service ports from any pod in the same namespace.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8092
        - protocol: TCP
          port: 8093
        {{- if .Values.admissionWebhooks.enabled }}
        - protocol: TCP
          port: 9443
        {{- end }}
        {{- if .Values.metrics.enabled }}
        - protocol: TCP
          port: {{ .Values.metrics.port }}
        {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.extraEgress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
