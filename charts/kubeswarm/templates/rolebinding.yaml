{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeswarm.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeswarm.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "kubeswarm.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
