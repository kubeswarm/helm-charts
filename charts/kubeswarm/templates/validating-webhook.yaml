{{- if .Values.admissionWebhooks.enabled }}
# ValidatingWebhookConfiguration.
# Guardrail webhooks (vswarmteam, vswarmagent) use admissionWebhooks.failurePolicy
# (default Ignore) so they never block kubectl apply when the operator is unavailable.
#
# Policy webhooks (vpolicy-swarmagent, vpolicy-swarmteam) are hardcoded to
# failurePolicy=Fail and only fire in namespaces labeled kubeswarm.io/policy-governed=true.
#
# Requires:
#   admissionWebhooks.certSecret - a Secret with tls.crt / tls.key in the operator namespace
#   admissionWebhooks.caBundle   - base64-encoded CA cert that signed tls.crt
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "kubeswarm.fullname" . }}-validating-webhook-configuration
  labels:
    {{- include "kubeswarm.labels" . | nindent 4 }}
webhooks:
  - name: vswarmteam.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kubeswarm.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubeswarm-v1alpha1-swarmteam
        port: 9443
      caBundle: {{ .Values.admissionWebhooks.caBundle | quote }}
    failurePolicy: {{ .Values.admissionWebhooks.failurePolicy | default "Ignore" }}
    timeoutSeconds: {{ .Values.admissionWebhooks.timeoutSeconds | default 10 }}
    sideEffects: None
    {{- with .Values.admissionWebhooks.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.admissionWebhooks.objectSelector }}
    objectSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    rules:
      - apiGroups: ["kubeswarm.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["swarmteams"]
  - name: vswarmagent.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kubeswarm.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubeswarm-v1alpha1-swarmagent
        port: 9443
      caBundle: {{ .Values.admissionWebhooks.caBundle | quote }}
    failurePolicy: {{ .Values.admissionWebhooks.failurePolicy | default "Ignore" }}
    timeoutSeconds: {{ .Values.admissionWebhooks.timeoutSeconds | default 10 }}
    sideEffects: None
    {{- with .Values.admissionWebhooks.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.admissionWebhooks.objectSelector }}
    objectSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    rules:
      - apiGroups: ["kubeswarm.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["swarmagents"]
  # SwarmPolicy enforcement webhook - validates agents against namespace policies.
  # failurePolicy=Fail - blocks agent creates/updates if webhook unavailable in governed
  # namespaces. Emergency bypass: annotate ValidatingWebhookConfiguration or namespace.
  # namespaceSelector targets only governed namespaces (zero overhead for ungoverned).
  - name: vpolicy-swarmagent.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kubeswarm.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubeswarm-v1alpha1-swarmagent-policy
        port: 9443
      caBundle: {{ .Values.admissionWebhooks.caBundle | quote }}
    failurePolicy: Fail
    timeoutSeconds: 5
    sideEffects: None
    namespaceSelector:
      matchLabels:
        kubeswarm.io/policy-governed: "true"
    rules:
      - apiGroups: ["kubeswarm.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["swarmagents"]
  # SwarmPolicy output validation webhook - validates SwarmTeam pipeline steps
  # have required output validation level (minValidation from policy).
  - name: vpolicy-swarmteam.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kubeswarm.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-kubeswarm-v1alpha1-swarmteam-policy
        port: 9443
      caBundle: {{ .Values.admissionWebhooks.caBundle | quote }}
    failurePolicy: Fail
    timeoutSeconds: 5
    sideEffects: None
    namespaceSelector:
      matchLabels:
        kubeswarm.io/policy-governed: "true"
    rules:
      - apiGroups: ["kubeswarm.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["swarmteams"]
{{- end }}
