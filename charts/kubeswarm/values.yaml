# Default values for kubeswarm.

# CRD management. When crds.install=true (default), the chart installs and upgrades
# the kubeswarm CRDs as part of the release. CRDs carry helm.sh/resource-policy: keep
# so that helm uninstall does NOT delete them (deleting CRDs cascades to every CR in
# the cluster, including SwarmAgents/SwarmTeams/SwarmRuns).
#
# Set crds.install=false when CRDs are managed out-of-band (Argo CD, Flux, kubectl apply).
# In that case you are responsible for keeping CRD schemas in sync with the operator
# version this chart ships.
crds:
  install: true

# Number of operator replicas. More than 1 requires leaderElection.enabled = true.
replicaCount: 1

# Deployment strategy. Leave {} for the k8s default (RollingUpdate, maxSurge=25%, maxUnavailable=25%).
# Example: { type: Recreate }
strategy: {}

# How many old ReplicaSets to retain for rollback.
revisionHistoryLimit: 10

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/kubeswarm/kubeswarm-controller
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []

# Namespace to deploy into. Defaults to the release namespace.
# Override with --namespace or --create-namespace on helm install.

serviceAccount:
  # Whether to create the ServiceAccount. Set to false to bring your own.
  create: true
  # Name of the ServiceAccount. When create=false, must already exist in the namespace.
  # When create=true and empty, defaults to the chart fullname.
  name: kubeswarm
  # Annotations added to the ServiceAccount. Common uses:
  # - eks.amazonaws.com/role-arn (IRSA on AWS)
  # - iam.gke.io/gcp-service-account (Workload Identity on GCP)
  # - azure.workload.identity/client-id (Azure Workload Identity)
  annotations: {}

# The container image used for SwarmAgent runtime pods.
agentImage: ghcr.io/kubeswarm/kubeswarm-runtime:0.2.0
agentImagePullPolicy: Always
# Secrets for pulling agent runtime images from private registries.
# Comma-separated list of secret names, e.g. "harbor-creds,ecr-creds".
# Per-agent spec.runtime.imagePullSecrets overrides this.
agentImagePullSecrets: ""

# dashboard - real-time web UI for monitoring and operating deployments.
# Disabled by default; enable for local dev or in-cluster monitoring.
dashboard:
  enabled: false
  image: ghcr.io/kubeswarm/dashboard:0.1.0
  imagePullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  priorityClassName: ""
  # Additional env vars for the dashboard container.
  extraEnv: []
  service:
    type: ClusterIP
    port: 8090
    annotations: {}
  # Ingress for exposing the dashboard externally.
  ingress:
    enabled: false
    className: ""
    annotations: {}
    # hosts:
    #   - host: dashboard.example.com
    #     paths:
    #       - path: /
    #         pathType: Prefix
    hosts: []
    tls: []

# Task queue connection string (required).
# Example: redis://my-redis.production.svc.cluster.local:6379
taskQueueURL: ""

# Redis connection string for SSE token streaming.
# Defaults to taskQueueURL when empty.
streamChannelURL: ""

# Redis connection string for spend tracking (RFC-0031).
# Defaults to taskQueueURL when empty. Set to a separate instance when budget
# accuracy is business-critical or write volume impacts queue latency.
spendStoreURL: ""

# Name of a ConfigMap in the operator namespace containing per-model pricing.
# When set, the operator loads custom prices from this ConfigMap instead of using
# built-in defaults. See RFC-0011 for the expected format.
# Example: kubeswarm-cost-pricing
costConfigmap: ""

leaderElection:
  enabled: true

# Operator log verbosity (zap). One of: debug, info, warn, error. Empty keeps operator default.
logLevel: ""
# Operator log encoder. One of: console, json. Empty keeps operator default.
logEncoder: ""

triggerWebhook:
  # Address the SwarmEvent webhook server listens on inside the pod.
  addr: ":8092"
  # External URL of the webhook server. Written to SwarmEvent status.webhookURL.
  # Example: http://kubeswarm.kubeswarm-system.svc.cluster.local:8092
  url: ""

mcpGateway:
  # Address the MCP SSE gateway listens on inside the pod (RFC-0020).
  addr: ":8093"
  # External URL of the MCP gateway. Written to SwarmAgent status and used to resolve
  # agentRef/capabilityRef entries in spec.tools.mcp and spec.agents. Must be reachable from agent pods.
  # Example: http://kubeswarm.kubeswarm-system.svc.cluster.local:8093
  url: ""

# Prometheus metrics endpoint.
metrics:
  # Set to true to expose /metrics on port 8080 (HTTP, insecure).
  enabled: false
  port: 8080

# Prometheus Operator ServiceMonitor. Creates a ServiceMonitor in the release namespace
# pointing at the operator metrics endpoint. Requires metrics.enabled=true and the
# Prometheus Operator CRDs installed in the cluster.
serviceMonitor:
  enabled: false
  # Scrape interval and timeout.
  interval: 30s
  scrapeTimeout: 10s
  # Extra labels added to the ServiceMonitor (used by Prometheus instance selectors).
  labels: {}
  # Prometheus relabeling rules.
  relabelings: []
  metricRelabelings: []

# Admission webhooks for inline prompt size guardrails.
# These are ValidatingWebhooks - they warn/deny oversized inline prompts before they hit etcd.
# Requires TLS for the operator webhook server (port 9443).
admissionWebhooks:
  enabled: false
  # Name of a Secret in the operator namespace containing tls.crt and tls.key.
  # The operator mounts it at /tmp/k8s-webhook-server/serving-certs.
  certSecret: ""
  # Base64-encoded CA certificate bundle. The API server uses this to verify the
  # operator's webhook TLS certificate. Required when enabled=true.
  caBundle: ""
  # failurePolicy for prompt-size guardrail webhooks (vswarmteam, vswarmagent).
  # Ignore: never block kubectl apply if the operator is unavailable. Recommended.
  # Fail: block kubectl apply when the operator is unavailable.
  failurePolicy: Ignore
  # Timeout for guardrail webhook calls. Default 10s.
  timeoutSeconds: 10
  # Optional namespaceSelector/objectSelector applied to the guardrail webhooks
  # (vswarmteam, vswarmagent). Policy webhooks keep their hardcoded
  # kubeswarm.io/policy-governed selector.
  namespaceSelector: {}
  objectSelector: {}

# Service for the SwarmEvent webhook server.
service:
  # ClusterIP: reachable from within the cluster only.
  # LoadBalancer: exposes externally via cloud load balancer.
  # NodePort: exposes externally via node port.
  type: ClusterIP
  port: 8092
  # Annotations added to the Service. Common uses:
  # - service.beta.kubernetes.io/aws-load-balancer-type: nlb
  # - networking.gke.io/load-balancer-type: Internal
  annotations: {}
  # Restricts which source IP ranges can reach LoadBalancer-type services.
  # Ignored for ClusterIP. Example: ["10.0.0.0/8"]
  loadBalancerSourceRanges: []


# Audit trail configuration (RFC-0030).
# Cluster-level defaults. Can be overridden per-namespace (SwarmSettings) or per-agent.
auditLog:
  # mode controls the verbosity of audit logging.
  # off: no audit events emitted (default).
  # actions: emit structured action events (tool calls, delegations, lifecycle, budget).
  # verbose: emit action events plus full LLM conversation turns (expensive).
  mode: "off"
  # sink selects the output backend: stdout | redis | webhook
  sink: stdout
  # webhookURL is required when sink=webhook.
  webhookURL: ""
  # redisURL is required when sink=redis. Use a separate Redis instance (see RFC-0031).
  redisURL: ""
  # maxStreamLen is the MAXLEN ~ cap on the audit Redis stream per namespace.
  # Tune based on throughput: at 50 agents x 60 tasks/hr x 5 events = ~15k events/hr.
  # Default 100000 entries. Only applies to the redis sink.
  maxStreamLen: 100000
  # maxDetailBytes is the max size for detail.input and detail.output before truncation.
  # 0 means unlimited.
  maxDetailBytes: 8192
  # redact is a list of glob patterns for field path redaction.
  # Patterns use dot-separated paths where * matches one segment.
  redact:
    - "detail.input.*.apiKey"
    - "detail.input.*.password"
    - "detail.input.*.token"

# OpenTelemetry configuration.
# When endpoint is set, the operator and agent pods export metrics and traces via OTLP HTTP.
# Leave empty to disable (no-op OTel, zero overhead).
otel:
  # OTLP collector endpoint, e.g. http://otel-collector.monitoring.svc:4318
  endpoint: ""

# Additional environment variables injected into the operator pod.
extraEnv: []

# Environment variables forwarded to every agent pod the operator creates.
# Use this to set cluster-wide agent defaults such as OPENAI_BASE_URL or AGENT_PROVIDER
# without needing a per-namespace secret.
# Example (Ollama):
#   agentExtraEnv:
#     - name: AGENT_PROVIDER
#       value: openai
#     - name: OPENAI_BASE_URL
#       value: http://ollama.ollama.svc.cluster.local:11434/v1
#     - name: OPENAI_API_KEY
#       value: ollama
agentExtraEnv: []

# Mount additional env vars from existing ConfigMaps or Secrets.
extraEnvFrom: []

# Additional volumes mounted into the operator pod. Common use: custom CA bundles
# for outbound TLS to corporate proxies or self-signed OTel collectors.
# Example:
#   extraVolumes:
#     - name: custom-ca
#       configMap:
#         name: corporate-ca
#   extraVolumeMounts:
#     - name: custom-ca
#       mountPath: /etc/ssl/certs/corporate-ca.crt
#       subPath: ca.crt
#       readOnly: true
extraVolumes: []
extraVolumeMounts: []

# Soft memory limit for the operator Go runtime (GOMEMLIMIT).
# Example: "100MiB". Leave empty to not set. Setting this close to resources.limits.memory
# helps the Go GC avoid OOM kills under memory pressure.
goMemLimit: ""

# Annotations added to the operator pod.
podAnnotations: {}

# Labels added to the operator pod. Common uses: sidecar injection opt-in
# (linkerd.io/inject: enabled), NetworkPolicy selectors.
podLabels: {}

# PriorityClassName for the operator pod. Typical values: system-cluster-critical,
# system-node-critical, or a custom PriorityClass.
priorityClassName: ""

# Must be > GracefulShutdownTimeout (8s) + preStop sleep (5s) to give the operator
# time to drain in-flight reconciles before Kubernetes sends SIGKILL.
terminationGracePeriodSeconds: 30

# Pod-level SecurityContext applied to the operator pod.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level SecurityContext applied to the manager container.
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

# Liveness and readiness probe tuning. Path and port are fixed (8081 /healthz and /readyz).
livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

# Resource limits and requests for the operator pod.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Spread replicas across failure domains. Only meaningful when replicaCount > 1.
# Example:
#   topologySpreadConstraints:
#     - maxSkew: 1
#       topologyKey: topology.kubernetes.io/zone
#       whenUnsatisfiable: ScheduleAnyway
#       labelSelector:
#         matchLabels:
#           app.kubernetes.io/name: kubeswarm
topologySpreadConstraints: []

# PodDisruptionBudget for the operator Deployment.
# Only meaningful when replicaCount > 1.
podDisruptionBudget:
  enabled: false
  # Set one of minAvailable or maxUnavailable. Strings (percentages) or ints are valid.
  minAvailable: 1
  # maxUnavailable: 1

# NetworkPolicy for the operator pod. When enabled, applies a default-deny policy
# and allows only the specified ingress/egress. Leave ingress/egress empty to block
# all traffic except what extraIngress/extraEgress allows.
networkPolicy:
  enabled: false
  # Ingress rules in addition to a default allow-from-same-namespace on the operator
  # ports (8092, 8093, 9443, metrics.port when enabled).
  extraIngress: []
  # Egress rules. When empty, egress is unrestricted (no egress policy applied).
  # Set to a non-empty list to restrict outbound traffic.
  extraEgress: []

# KEDA autoscaling support.
# When an SwarmAgent has spec.runtime.autoscaling set, the operator creates a KEDA
# ScaledObject that scales replicas based on Redis task queue depth.
# Requires KEDA v2 installed in the cluster (https://keda.sh/docs/deploy/).
# The operator gracefully skips ScaledObject creation when KEDA is not present.
keda:
  # enabled documents that KEDA is expected to be installed in this cluster.
  # This value is informational only - the operator detects KEDA at runtime.
  enabled: false
